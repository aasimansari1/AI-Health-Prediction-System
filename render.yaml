services:
  - type: web
    name: medipredict-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python train_model.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 60 app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        sync: false   # set this in the Render dashboard to your Vercel URL after frontend deploys
